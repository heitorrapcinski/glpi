# ─────────────────────────────────────────────────────────────────────────────
# GLPI Microservices Backend — Docker Compose
#
# Usage:
#   Start all infrastructure + services:   docker compose up -d
#   Start infrastructure only:             docker compose up -d kafka mongodb
#
# All environment variables are defined in the .env file at the project root.
# See .env.example for all available variables and their documented defaults.
# ─────────────────────────────────────────────────────────────────────────────

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - glpi-net

x-microservice-defaults: &microservice-defaults
  <<: *service-defaults
  build:
    context: .
  depends_on:
    mongodb:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.7.1
    container_name: glpi-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb:
    <<: *service-defaults
    image: mongo:7.0
    container_name: glpi-mongodb
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microservices ─────────────────────────────────────────────────────────

  api-gateway:
    <<: *microservice-defaults
    image: glpi/api-gateway:${VERSION}
    container_name: glpi-api-gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT}:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8080
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL}
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
      PROBLEM_SERVICE_URL: ${PROBLEM_SERVICE_URL}
      CHANGE_SERVICE_URL: ${CHANGE_SERVICE_URL}
      ASSET_SERVICE_URL: ${ASSET_SERVICE_URL}
      SLA_SERVICE_URL: ${SLA_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      KNOWLEDGE_SERVICE_URL: ${KNOWLEDGE_SERVICE_URL}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE}

  identity-service:
    <<: *microservice-defaults
    image: glpi/identity-service:${VERSION}
    container_name: glpi-identity-service
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    ports:
      - "${IDENTITY_SERVICE_PORT}:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8081
      MONGODB_URI: ${IDENTITY_MONGODB_URI}
      JWT_ACCESS_TOKEN_EXPIRY_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRY_SECONDS}
      JWT_REFRESH_TOKEN_EXPIRY_SECONDS: ${JWT_REFRESH_TOKEN_EXPIRY_SECONDS}
      BCRYPT_COST: ${BCRYPT_COST}

  ticket-service:
    <<: *microservice-defaults
    image: glpi/ticket-service:${VERSION}
    container_name: glpi-ticket-service
    build:
      context: .
      dockerfile: ticket-service/Dockerfile
    ports:
      - "${TICKET_SERVICE_PORT}:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8082
      MONGODB_URI: ${TICKET_MONGODB_URI}
      SLA_SERVICE_URL: ${SLA_SERVICE_URL}

  problem-service:
    <<: *microservice-defaults
    image: glpi/problem-service:${VERSION}
    container_name: glpi-problem-service
    build:
      context: .
      dockerfile: problem-service/Dockerfile
    ports:
      - "${PROBLEM_SERVICE_PORT}:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8083
      MONGODB_URI: ${PROBLEM_MONGODB_URI}

  change-service:
    <<: *microservice-defaults
    image: glpi/change-service:${VERSION}
    container_name: glpi-change-service
    build:
      context: .
      dockerfile: change-service/Dockerfile
    ports:
      - "${CHANGE_SERVICE_PORT}:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8084
      MONGODB_URI: ${CHANGE_MONGODB_URI}

  asset-service:
    <<: *microservice-defaults
    image: glpi/asset-service:${VERSION}
    container_name: glpi-asset-service
    build:
      context: .
      dockerfile: asset-service/Dockerfile
    ports:
      - "${ASSET_SERVICE_PORT}:8085"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8085
      MONGODB_URI: ${ASSET_MONGODB_URI}

  sla-service:
    <<: *microservice-defaults
    image: glpi/sla-service:${VERSION}
    container_name: glpi-sla-service
    build:
      context: .
      dockerfile: sla-service/Dockerfile
    ports:
      - "${SLA_SERVICE_PORT}:8086"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8086
      MONGODB_URI: ${SLA_MONGODB_URI}
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
      ESCALATION_CRON: ${ESCALATION_CRON}

  notification-service:
    <<: *microservice-defaults
    image: glpi/notification-service:${VERSION}
    container_name: glpi-notification-service
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8087"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8087
      MONGODB_URI: ${NOTIFICATION_MONGODB_URI}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      NOTIFICATION_SENDER_EMAIL: ${NOTIFICATION_SENDER_EMAIL}

  knowledge-service:
    <<: *microservice-defaults
    image: glpi/knowledge-service:${VERSION}
    container_name: glpi-knowledge-service
    build:
      context: .
      dockerfile: knowledge-service/Dockerfile
    ports:
      - "${KNOWLEDGE_SERVICE_PORT}:8088"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      SERVER_PORT: 8088
      MONGODB_URI: ${KNOWLEDGE_MONGODB_URI}

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  mongodb-data:
    driver: local
  kafka-data:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  glpi-net:
    driver: bridge
