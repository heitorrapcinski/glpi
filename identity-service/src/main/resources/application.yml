server:
  port: 8081

spring:
  application:
    name: identity-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/identity_db}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    user:
      name: actuator
      password: actuator

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

identity:
  jwt:
    # Base64-encoded PKCS8 private key (PEM without headers). Leave blank to use ephemeral dev key.
    private-key: ${JWT_PRIVATE_KEY:}
    # Base64-encoded X509 public key (PEM without headers). Leave blank to use ephemeral dev key.
    public-key: ${JWT_PUBLIC_KEY:}
  encryption:
    # Base64-encoded 32-byte AES-256 key. Leave blank to generate a random dev key.
    aes-key: ${AES_ENCRYPTION_KEY:}

logging:
  level:
    com.glpi.identity: INFO
